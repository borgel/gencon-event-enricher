<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GenCon Event Enricher</title>
<link rel="stylesheet" href="styles.css">
<script src="vendor/minisearch.min.js"></script>
</head>
<body>
<header id="app-header">
  <button id="hamburger" type="button" aria-label="Toggle filters">☰</button>
  <h1>GenCon Event Enricher</h1>
  <div id="header-meta"></div>
</header>
<div id="drawer-backdrop"></div>
<div id="app-shell">
  <aside id="filter-rail"></aside>
  <main id="results">
    <div id="results-summary"></div>
    <div id="results-toolbar"></div>
    <div id="results-body">
      <div id="results-list-wrap">
        <div id="results-header" class="row-header">
          <span class="row-cell friend-stripe"></span>
          <span class="row-cell marks"></span>
          <span class="row-cell title">Title</span>
          <span class="row-cell type">Type</span>
          <span class="row-cell when">When</span>
          <span class="row-cell tix">Tix</span>
          <span class="row-cell bgg">BGG</span>
        </div>
        <div id="results-list"></div>
      </div>
      <div id="results-timeline" class="hidden"></div>
      <aside id="detail-panel" class="hidden" aria-hidden="true"></aside>
    </div>
  </main>
</div>
<div id="modal-backdrop" class="hidden"></div>

<div id="import-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Import schedule</h3>
    <p class="summary"></p>
    <form id="import-form">
      <label class="action-row">
        <input type="radio" name="import-action" value="replace-mine">
        <span>Replace my events</span>
      </label>
      <label class="action-row">
        <input type="radio" name="import-action" value="add-mine">
        <span>Add to my events</span>
      </label>
      <label class="action-row">
        <input type="radio" name="import-action" value="replace-list">
        <span>Replace an existing friend's list:</span>
        <select id="replace-list-select"></select>
      </label>
      <label class="action-row">
        <input type="radio" name="import-action" value="new-list">
        <span>Import as a new friend's list:</span>
        <input type="text" id="new-list-name" placeholder="Name">
      </label>
    </form>
    <div class="modal-actions">
      <button type="button" class="cancel-btn">Cancel</button>
      <button type="button" class="confirm-btn" id="import-confirm">Import</button>
    </div>
  </div>
</div>

<div id="export-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Export collection</h3>
    <form id="export-form">
      <div id="export-sources"></div>
      <label class="action-row">
        <span>Name for this export:</span>
        <input type="text" id="export-name" placeholder="Your name">
      </label>
    </form>
    <div class="modal-actions">
      <button type="button" class="cancel-btn">Cancel</button>
      <button type="button" class="confirm-btn" id="export-confirm">Download</button>
    </div>
  </div>
</div>

<div id="share-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Share schedule</h3>
    <form id="share-form">
      <div id="share-sources"></div>
      <label class="action-row">
        <span>Name for this share:</span>
        <input type="text" id="share-name" placeholder="Your name">
      </label>
      <label class="action-row column">
        <span>Copy this text and send it to a friend:</span>
        <textarea id="share-blob" class="blob-textarea" readonly rows="6"></textarea>
      </label>
    </form>
    <div class="modal-actions">
      <span id="share-copied-status" class="copied-status" aria-live="polite"></span>
      <button type="button" class="cancel-btn">Close</button>
      <button type="button" class="confirm-btn" id="share-copy">Copy</button>
    </div>
  </div>
</div>

<div id="paste-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Paste schedule</h3>
    <form id="paste-form">
      <label class="action-row column">
        <span>Paste the shared text here:</span>
        <textarea id="paste-blob" class="blob-textarea" rows="6"
          placeholder="GENCON1:…"></textarea>
      </label>
      <p id="paste-error" class="paste-error hidden" role="alert"></p>
    </form>
    <div class="modal-actions">
      <button type="button" class="cancel-btn">Cancel</button>
      <button type="button" class="confirm-btn" id="paste-decode">Decode</button>
    </div>
  </div>
</div>

<div id="manage-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Manage friend's lists</h3>
    <div id="manage-rows"></div>
    <div class="modal-actions">
      <button type="button" class="cancel-btn">Close</button>
    </div>
  </div>
</div>

<script type="module" src="app/main.js"></script>
</body>
</html>
