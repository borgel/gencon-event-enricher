<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GenCon Event Enricher</title>
<link rel="stylesheet" href="styles.css">
<script src="vendor/minisearch.min.js"></script>
</head>
<body>
<header id="app-header">
  <button id="hamburger" type="button" aria-label="Toggle filters">☰</button>
  <h1>GenCon Event Enricher</h1>
  <div id="header-meta"></div>
</header>
<div id="drawer-backdrop"></div>
<div id="app-shell">
  <aside id="filter-rail"></aside>
  <main id="results">
    <div id="results-summary"></div>
    <div id="results-toolbar"></div>
    <div id="results-body">
      <div id="results-header" class="row-header">
        <span class="row-cell marks"></span>
        <span class="row-cell title">Title</span>
        <span class="row-cell type">Type</span>
        <span class="row-cell when">When</span>
        <span class="row-cell tix">Tix</span>
        <span class="row-cell bgg">BGG</span>
      </div>
      <div id="results-list"></div>
      <div id="results-timeline" class="hidden"></div>
      <aside id="detail-panel" class="hidden" aria-hidden="true"></aside>
    </div>
  </main>
</div>
<script type="module" src="app/main.js"></script>
</body>
</html>
